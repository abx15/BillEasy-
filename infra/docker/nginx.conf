# Nginx Config - Reverse proxy for web app
events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:3001;
    }

    upstream ml_api {
        server ml-api:8000;
    }

    upstream web {
        server web:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Web app
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ML API routes
        location /ml-api/ {
            proxy_pass http://ml_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files
        location /files/ {
            alias /app/files/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
