version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-billeasy}
      POSTGRES_USER: ${DB_USER:-billeasy}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-billeasy} -d ${DB_NAME:-billeasy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - billeasy-network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - billeasy-network

  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-billeasy}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-billeasy}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: 3001
    volumes:
      - api_uploads:/app/uploads
    networks:
      - billeasy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ml-api:
    build:
      context: ./apps/ml-api
      dockerfile: ../../infra/docker/Dockerfile.ml
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-billeasy}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-billeasy}
      PYTHONPATH: /app
    networks:
      - billeasy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=10)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
    restart: always
    depends_on:
      - api
      - ml-api
    environment:
      NEXT_PUBLIC_API_URL: ${PRODUCTION_URL}/api
      NEXT_PUBLIC_ML_API_URL: ${PRODUCTION_URL}/ml
      NODE_ENV: production
      PORT: 3000
    networks:
      - billeasy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
      - api
      - ml-api
    networks:
      - billeasy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local
  nginx_logs:
    driver: local

networks:
  billeasy-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
