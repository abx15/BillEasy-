apiVersion: 1

providers:
  - name: 'billeasy-overview'
    orgId: 1
    folder: 'BillEasy'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/billeasy-overview.json

  - name: 'billeasy-business-metrics'
    orgId: 1
    folder: 'BillEasy'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/billeasy-business-metrics.json

  - name: 'billeasy-infrastructure'
    orgId: 1
    folder: 'BillEasy'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/billeasy-infrastructure.json
